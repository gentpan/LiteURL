<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>申请短链 - LiteURL</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #09090b; color: #fafafa; }
    .wrap { max-width: 420px; margin: 0 auto; padding: 24px 16px; }
    h2 { font-size: 18px; margin: 0 0 16px; font-weight: 600; }
    label { display: block; font-size: 13px; color: #a1a1aa; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 12px; background: #09090b; border: 1px solid #27272a; border-radius: 8px; color: #fafafa; font-size: 14px; outline: none; }
    input:focus { border-color: #52525b; }
    .row { margin-bottom: 14px; }
    .alias-box { display: flex; align-items: center; border: 1px solid #27272a; border-radius: 8px; background: #09090b; }
    .alias-box:focus-within { border-color: #52525b; }
    .alias-box span { padding: 0 10px; color: #52525b; font-size: 13px; }
    .alias-box input { border: none; background: transparent; }
    button { width: 100%; padding: 11px; background: #fafafa; color: #18181b; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .result { display: flex; gap: 8px; align-items: center; margin-top: 14px; padding: 10px 12px; background: #18181b; border: 1px solid #27272a; border-radius: 8px; }
    .result a { flex: 1; color: #fafafa; font-family: monospace; font-size: 13px; text-decoration: none; word-break: break-all; }
    .result a:hover { text-decoration: underline; }
    .result button { width: auto; padding: 6px 12px; font-size: 12px; }
    .err { color: #ef4444; font-size: 13px; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h2>申请短链</h2>
    <div class="row">
      <label>目标链接</label>
      <input id="url" type="url" placeholder="https://example.com/..." />
    </div>
    <div class="row">
      <label>自定义后缀（可选）</label>
      <div class="alias-box">
        <span>uz.bi/</span>
        <input id="alias" placeholder="my-link" />
      </div>
    </div>
    <button id="go" onclick="submit()">生成短链</button>
    <div id="err" class="err"></div>
    <div id="out"></div>
  </div>

  <script>
    const API = location.origin + '/api/public/link'
    async function submit() {
      const url = document.getElementById('url').value.trim()
      const alias = document.getElementById('alias').value.trim()
      const err = document.getElementById('err')
      const out = document.getElementById('out')
      const btn = document.getElementById('go')
      err.textContent = ''; out.innerHTML = ''
      if (!url) { err.textContent = '请输入目标链接'; return }
      btn.disabled = true; btn.textContent = '生成中...'
      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(alias ? { url, alias } : { url }),
        })
        const data = await res.json()
        if (!res.ok) { err.textContent = data.error || '生成失败'; return }
        out.innerHTML = '<div class="result"><a href="' + data.shortUrl + '" target="_blank" rel="noopener">' + data.shortUrl + '</a><button onclick="copy()">复制</button></div>'
      } catch (e) {
        err.textContent = '网络错误'
      } finally {
        btn.disabled = false; btn.textContent = '生成短链'
      }
    }
    function copy() {
      const a = document.querySelector('#out a')
      if (a) navigator.clipboard.writeText(a.href)
    }
  </script>
</body>
</html>
